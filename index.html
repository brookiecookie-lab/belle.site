<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>belle.</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
  :root {
    --lair: #F5F0E8;
    --lanuit: #1A1A1A;
    --lamonte: #C9A84C;
    --rose-profond: #C97B8A;
    --miranda: #7D2027;
    --ll-velvet: #2D4A3E;

    --s-1: 8px;
    --s-2: 13px;
    --s-3: 21px;
    --s-4: 34px;
    --s-5: 55px;
  }

  body {
    margin: 0;
    background: var(--lair);
    color: var(--lanuit);
    font-family: 'Jost', sans-serif;
  }

  .wrap {
    padding: var(--s-3);
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    line-height: 1;
  }

  .hero {
    padding: var(--s-5) 0;
  }

  .btn {
    margin-top: var(--s-3);
    padding: var(--s-2) var(--s-3);
    background: var(--lamonte);
    border: none;
    font-size: 12px;
    letter-spacing: .1em;
  }

  .receipt {
    background: var(--ll-velvet);
    color: #fff;
    padding: var(--s-4);
    margin-top: var(--s-5);
  }

  .dawn {
    background: var(--miranda);
    color: white;
    padding: var(--s-4);
    margin-top: var(--s-5);
  }
  </style>
</head>

<body>

<div class="wrap">

  <h1>belle.</h1>
  <p>The dawn of disciplined taste.</p>

  <div class="hero">
    <h1>The look was never the price tag.</h1>
    <p>We don’t follow trends. We follow what works.</p>
    <button class="btn">THIS WEEK’S STEAL DROP</button>
  </div>

  <div class="receipt">
    <h2>LL Approved.</h2>
    <p>Real reviews. Real women. Real results.</p>
  </div>

  <div class="dawn">
    <h2>THE DAWN WINDOW</h2>
    <p>Every Tuesday. 5:55am CT.</p>
    <p>24 hours. One drop. The devil gets first access.</p>
  </div>

</div>

</body>
</html>
